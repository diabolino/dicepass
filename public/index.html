<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Crypto-safe random (Web Crypto API) ─────────────────────────────
function cryptoRandomInt(max) {
  const array = new Uint32Array(1);
  crypto.getRandomValues(array);
  return array[0] % max;
}

// ── Crack time estimation ───────────────────────────────────────────
function crackTime(bits) {
  const s = Math.pow(2, bits) / 1e12 / 2;
  if (s < 1) return '< 1 seconde';
  if (s < 60) return `${Math.round(s)} secondes`;
  if (s < 3600) return `${Math.round(s / 60)} minutes`;
  if (s < 86400) return `${Math.round(s / 3600)} heures`;
  const d = 86400, y = d * 365.25;
  if (s < y) return `${Math.round(s / d)} jours`;
  if (s < y * 1e3) return `${Math.round(s / y)} ans`;
  if (s < y * 1e6) return `${(s / (y * 1e3)).toFixed(0)} milliers d'années`;
  if (s < y * 1e9) return `${(s / (y * 1e6)).toFixed(0)} millions d'années`;
  return `${(s / (y * 1e9)).toFixed(0)} milliards d'années`;
}

// ── Generate passphrase (client-side) ───────────────────────────────
function generatePassphrase(wordlist, { words, separator, casing, addDigit, addSymbol }) {
  if (!wordlist.length) return null;
  const picked = [];
  for (let i = 0; i < words; i++) {
    let w = wordlist[cryptoRandomInt(wordlist.length)];
    if (casing === 'capitalize') w = w[0].toUpperCase() + w.slice(1);
    else if (casing === 'upper') w = w.toUpperCase();
    picked.push(w);
  }
  let pass = picked.join(separator);
  let extra = '';
  if (addDigit) { const d = cryptoRandomInt(10).toString(); pass += d; extra += d; }
  if (addSymbol) { const sym = '!@#$%&*?'; const c = sym[cryptoRandomInt(sym.length)]; pass += c; extra += c; }

  let entropy = Math.log2(wordlist.length) * words;
  if (addDigit) entropy += Math.log2(10);
  if (addSymbol) entropy += Math.log2(8);

  return {
    passphrase: pass,
    parts: picked,
    extra,
    entropy: +entropy.toFixed(1),
    crackTime: crackTime(entropy),
    length: pass.length,
  };
}

// ── Icons ───────────────────────────────────────────────────────────
const IconSun = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
);
const IconMoon = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  </svg>
);
const IconCopy = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
  </svg>
);
const IconRefresh = () => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
  </svg>
);
const IconShield = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
  </svg>
);
const IconChevron = ({ open }) => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    className={`transform transition-transform ${open ? 'rotate-180' : ''}`}>
    <polyline points="6 9 12 15 18 9"/>
  </svg>
);
const IconApi = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </svg>
);

// ── Strength indicator ──────────────────────────────────────────────
function strengthInfo(entropy) {
  if (entropy < 50) return { label: 'Faible', color: 'bg-red-500', text: 'text-red-500 dark:text-red-400' };
  if (entropy < 65) return { label: 'Moyen', color: 'bg-orange-500', text: 'text-orange-500 dark:text-orange-400' };
  if (entropy < 80) return { label: 'Fort', color: 'bg-yellow-500', text: 'text-yellow-400' };
  if (entropy < 100) return { label: 'Très fort', color: 'bg-emerald-500', text: 'text-emerald-500 dark:text-emerald-400' };
  return { label: 'Extrême', color: 'bg-emerald-400', text: 'text-emerald-400' };
}

// ── Toast Component ─────────────────────────────────────────────────
function Toast({ show, message }) {
  return (
    <div className={`fixed bottom-6 left-1/2 z-50 px-5 py-2.5 rounded-full font-semibold text-sm
      bg-emerald-500 text-white shadow-lg shadow-emerald-500/25
      transition-all duration-300
      ${show ? 'toast-active' : 'toast-enter pointer-events-none'}`}>
      {message}
    </div>
  );
}

// ── FAQ Item ────────────────────────────────────────────────────────
function FaqItem({ q, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="border border-brd dark:border-brd-dark rounded-xl overflow-hidden">
      <button onClick={() => setOpen(!open)}
        className="w-full px-5 py-4 flex items-center justify-between gap-4 text-left
          font-semibold text-sm text-txt dark:text-txt-dark
          hover:bg-base dark:hover:bg-base-dark/50 transition-colors">
        <span>{q}</span>
        <IconChevron open={open} />
      </button>
      <div className={`overflow-hidden transition-all duration-300 ${open ? 'max-h-60' : 'max-h-0'}`}>
        <div className="px-5 pb-4 text-sm text-txt2 dark:text-txt2-dark leading-relaxed">
          {children}
        </div>
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────────
function App() {
  // Theme
  const [theme, setTheme] = useState(() => {
    if (typeof window !== 'undefined') {
      const saved = localStorage.getItem('dicepass-theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    return 'dark';
  });

  useEffect(() => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
    localStorage.setItem('dicepass-theme', theme);
  }, [theme]);

  useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const handler = (e) => {
      if (!localStorage.getItem('dicepass-theme-manual')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    };
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);

  const toggleTheme = () => {
    localStorage.setItem('dicepass-theme-manual', '1');
    setTheme(t => t === 'dark' ? 'light' : 'dark');
  };

  // Wordlist
  const [wordlist, setWordlist] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch('wordlist.json')
      .then(r => r.json())
      .then(w => { setWordlist(w); setLoading(false); })
      .catch(e => { console.error(e); setLoading(false); });
  }, []);

  // Options
  const [words, setWords] = useState(6);
  const [separator, setSeparator] = useState('-');
  const [casing, setCasing] = useState('lower');
  const [addDigit, setAddDigit] = useState(false);
  const [addSymbol, setAddSymbol] = useState(false);

  // Result
  const [result, setResult] = useState(null);
  const [animKey, setAnimKey] = useState(0);
  const [toast, setToast] = useState(false);

  // Generate
  const generate = useCallback(() => {
    if (!wordlist.length) return;
    const r = generatePassphrase(wordlist, { words, separator, casing, addDigit, addSymbol });
    setResult(r);
    setAnimKey(k => k + 1);
  }, [wordlist, words, separator, casing, addDigit, addSymbol]);

  useEffect(() => { generate(); }, [generate]);

  // Copy
  const copy = async () => {
    if (!result) return;
    try {
      await navigator.clipboard.writeText(result.passphrase);
      setToast(true);
      setTimeout(() => setToast(false), 2000);
    } catch(e) {}
  };

  // Keyboard
  useEffect(() => {
    const handler = (e) => {
      if (e.key === ' ' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        generate();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [generate]);

  const strength = result ? strengthInfo(result.entropy) : null;
  const meterPct = result ? Math.min((result.entropy / 130) * 100, 100) : 0;

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-base dark:bg-base-dark">
        <div className="text-center">
          <div className="inline-block w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mb-4" />
          <p className="text-txt2 dark:text-txt2-dark text-sm">Chargement de la wordlist…</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-base dark:bg-base-dark noise font-sans">
      <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 py-8 sm:py-12">

        {/* Header */}
        <header className="flex items-center justify-between mb-8 sm:mb-10">
          <div className="flex items-center gap-3">
            <div className="flex items-center justify-center w-10 h-10 rounded-xl bg-accent text-white text-xl
              shadow-lg shadow-accent/25">🎲</div>
            <div>
              <h1 className="font-mono text-xl sm:text-2xl font-bold text-txt dark:text-txt-dark tracking-tight leading-none">
                DicePass
              </h1>
              <p className="text-txt2 dark:text-txt2-dark text-xs mt-0.5">
                Diceware FR — {wordlist.length} mots —{' '}
                <code className="font-mono bg-subtle dark:bg-subtle-dark px-1 py-0.5 rounded">Web Crypto</code>
              </p>
            </div>
          </div>
          <button onClick={toggleTheme} title="Changer le thème"
            className="p-2 rounded-lg text-txt2 dark:text-txt2-dark
              hover:bg-subtle dark:hover:bg-subtle-dark transition-colors">
            {theme === 'dark' ? <IconSun /> : <IconMoon />}
          </button>
        </header>

        {/* Two-column layout on large screens */}
        <div className="grid grid-cols-1 lg:grid-cols-[1fr_1fr] xl:grid-cols-[1fr_520px] gap-5">

          {/* LEFT: Generator */}
          <div className="space-y-5">
            <div className="bg-surface dark:bg-surface-dark border border-brd dark:border-brd-dark
              rounded-2xl p-5 sm:p-7 shadow-sm">

              {/* Output */}
              <div className={`relative rounded-xl p-5 sm:p-6 min-h-[100px] flex items-center justify-center text-center
                mb-5 transition-all duration-300
                ${result
                  ? 'bg-accent/5 dark:bg-accent/10 border-2 border-accent/30'
                  : 'bg-base dark:bg-base-dark border-2 border-dashed border-brd dark:border-brd-dark'}`}>
                {result && (
                  <div key={animKey} className="animate-in font-mono text-lg sm:text-xl lg:text-2xl font-semibold
                    leading-relaxed break-all select-all text-txt dark:text-txt-dark">
                    {result.parts.map((word, i) => (
                      <React.Fragment key={i}>
                        {i > 0 && separator && (
                          <span className="text-accent">{separator}</span>
                        )}
                        <span>{word}</span>
                      </React.Fragment>
                    ))}
                    {result.extra && <span className="text-yellow-500">{result.extra}</span>}
                  </div>
                )}
              </div>

              {/* Stats */}
              {result && (
                <div className="grid grid-cols-3 gap-3 mb-5">
                  <div className="bg-base dark:bg-base-dark rounded-lg p-3 text-center">
                    <div className="text-[0.65rem] uppercase tracking-wider text-txt2 dark:text-txt2-dark mb-1 font-medium">
                      Entropie
                    </div>
                    <div className={`font-mono font-bold text-sm sm:text-base ${strength.text}`}>
                      {result.entropy} bits
                    </div>
                  </div>
                  <div className="bg-base dark:bg-base-dark rounded-lg p-3 text-center">
                    <div className="text-[0.65rem] uppercase tracking-wider text-txt2 dark:text-txt2-dark mb-1 font-medium">
                      Crack (1T/s)
                    </div>
                    <div className="font-mono font-bold text-sm sm:text-base text-yellow-500 dark:text-yellow-400">
                      {result.crackTime}
                    </div>
                  </div>
                  <div className="bg-base dark:bg-base-dark rounded-lg p-3 text-center">
                    <div className="text-[0.65rem] uppercase tracking-wider text-txt2 dark:text-txt2-dark mb-1 font-medium">
                      Longueur
                    </div>
                    <div className="font-mono font-bold text-sm sm:text-base text-accent">
                      {result.length} car.
                    </div>
                  </div>
                </div>
              )}

              {/* Entropy meter */}
              {result && (
                <div className="mb-5">
                  <div className="flex items-center justify-between mb-1.5">
                    <div className="flex items-center gap-1.5">
                      <IconShield />
                      <span className={`text-xs font-semibold ${strength.text}`}>{strength.label}</span>
                    </div>
                    <span className="text-xs text-txt2 dark:text-txt2-dark font-mono">{result.entropy} / 130 bits</span>
                  </div>
                  <div className="h-1.5 bg-subtle dark:bg-subtle-dark rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-500 ease-out ${strength.color}`}
                      style={{ width: `${meterPct}%` }} />
                  </div>
                </div>
              )}

              {/* Buttons */}
              <div className="flex gap-3 mb-7">
                <button onClick={generate}
                  className="flex-1 flex items-center justify-center gap-2 px-5 py-3 rounded-xl
                    bg-accent text-white font-semibold text-sm
                    shadow-lg shadow-accent/25
                    hover:brightness-110 hover:-translate-y-0.5
                    active:translate-y-0 transition-all duration-150">
                  <IconRefresh /> Générer
                </button>
                <button onClick={copy} disabled={!result}
                  className="flex items-center justify-center gap-2 px-5 py-3 rounded-xl
                    bg-subtle dark:bg-subtle-dark text-txt dark:text-txt-dark
                    border border-brd dark:border-brd-dark font-semibold text-sm
                    hover:border-txt2/50 dark:hover:border-txt2-dark/50
                    disabled:opacity-35 disabled:cursor-default transition-all">
                  <IconCopy /> Copier
                </button>
              </div>

              {/* Options */}
              <div className="font-mono text-[0.7rem] uppercase tracking-widest text-txt2 dark:text-txt2-dark mb-4
                flex items-center gap-3">
                <span>Options</span>
                <div className="flex-1 h-px bg-brd dark:bg-brd-dark" />
              </div>

              <div className="space-y-5">
                {/* Word count slider */}
                <div>
                  <div className="flex items-baseline justify-between mb-2">
                    <label className="text-sm font-medium text-txt2 dark:text-txt2-dark">Nombre de mots</label>
                    <span className="font-mono font-bold text-lg text-accent">{words}</span>
                  </div>
                  <input type="range" min="3" max="12" value={words}
                    onChange={e => setWords(+e.target.value)}
                    className="w-full bg-subtle dark:bg-subtle-dark cursor-pointer" />
                  <div className="flex justify-between mt-1 text-[0.65rem] text-txt2 dark:text-txt2-dark font-mono">
                    <span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span>
                  </div>
                </div>

                {/* Separator + Casing */}
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-txt2 dark:text-txt2-dark mb-1.5">Séparateur</label>
                    <select value={separator} onChange={e => setSeparator(e.target.value)}
                      className="w-full px-3 py-2.5 rounded-lg appearance-none cursor-pointer
                        bg-base dark:bg-base-dark text-txt dark:text-txt-dark
                        border border-brd dark:border-brd-dark
                        font-mono text-sm outline-none
                        focus:border-accent transition-colors">
                      <option value="-">Tiret ( - )</option>
                      <option value=".">Point ( . )</option>
                      <option value=" ">Espace</option>
                      <option value="_">Underscore ( _ )</option>
                      <option value="">Aucun</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-txt2 dark:text-txt2-dark mb-1.5">Casse</label>
                    <select value={casing} onChange={e => setCasing(e.target.value)}
                      className="w-full px-3 py-2.5 rounded-lg appearance-none cursor-pointer
                        bg-base dark:bg-base-dark text-txt dark:text-txt-dark
                        border border-brd dark:border-brd-dark
                        font-mono text-sm outline-none
                        focus:border-accent transition-colors">
                      <option value="lower">minuscules</option>
                      <option value="capitalize">Première Majuscule</option>
                      <option value="upper">MAJUSCULES</option>
                    </select>
                  </div>
                </div>

                {/* Checkboxes */}
                <div className="flex flex-wrap gap-x-6 gap-y-3">
                  {[
                    [addDigit, setAddDigit, 'Ajouter un chiffre'],
                    [addSymbol, setAddSymbol, 'Ajouter un symbole'],
                  ].map(([val, setter, label]) => (
                    <label key={label} className="flex items-center gap-2.5 cursor-pointer select-none group">
                      <input type="checkbox" checked={val} onChange={e => setter(e.target.checked)}
                        className="sr-only" />
                      <div className={`w-5 h-5 rounded-md border-2 flex-shrink-0 flex items-center justify-center transition-all
                        ${val
                          ? 'bg-accent border-accent'
                          : 'border-brd dark:border-brd-dark group-hover:border-accent/50'}`}>
                        {val && (
                          <svg className="w-3 h-3 text-white" viewBox="0 0 12 12" fill="none"
                            stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="2 6 5 9 10 3"/>
                          </svg>
                        )}
                      </div>
                      <span className="text-sm text-txt2 dark:text-txt2-dark group-hover:text-txt dark:group-hover:text-txt-dark transition-colors">
                        {label}
                      </span>
                    </label>
                  ))}
                </div>
              </div>

              <p className="mt-5 text-[0.7rem] text-txt2 dark:text-txt2-dark text-center">
                Appuyez sur <kbd className="font-mono bg-subtle dark:bg-subtle-dark px-1.5 py-0.5 rounded text-[0.65rem]">Espace</kbd> pour régénérer
              </p>
            </div>
          </div>

          {/* RIGHT: API + FAQ */}
          <div className="space-y-5">

            {/* API Documentation */}
            <div className="bg-surface dark:bg-surface-dark border border-brd dark:border-brd-dark
              rounded-2xl p-5 sm:p-7 shadow-sm">
              <h2 className="font-mono text-base font-bold text-txt dark:text-txt-dark mb-4 flex items-center gap-2">
                <IconApi />
                <span>API</span>
                <span className="text-[0.6rem] uppercase tracking-wide bg-accent text-white px-2 py-0.5 rounded font-semibold">
                  JSON
                </span>
              </h2>

            {/* FAQ */}
            <div className="space-y-2">
              <FaqItem q="Qu'est-ce que la méthode Diceware ?">
                La méthode Diceware, inventée par Arnold Reinhold en 1995, consiste à créer un mot de passe en
                assemblant des mots choisis aléatoirement dans une liste de 7776 mots (6⁵). Ici, l'aléa est
                fourni par votre navigateur via <code className="font-mono text-xs bg-subtle dark:bg-subtle-dark px-1 rounded">crypto.getRandomValues()</code>,
                un générateur cryptographiquement sécurisé. Aucune donnée ne quitte votre navigateur.
              </FaqItem>
              <FaqItem q="Combien de mots faut-il ?">
                L'EFF et l'ANSSI recommandent au moins 5 mots pour un usage courant (~65 bits d'entropie).
                6 mots (~77 bits) conviennent aux comptes sensibles. 7+ mots pour les applications critiques
                comme un master password ou du chiffrement de disque.
              </FaqItem>
              <FaqItem q="Pourquoi c'est plus sûr qu'un mot de passe classique ?">
                Un mot de passe classique de 8 caractères offre ~40-50 bits d'entropie et est difficile à retenir.
                5 mots aléatoires parmi 7776 offrent ~65 bits tout en étant mémorisables, car les mots forment
                une image mentale. La force vient du nombre astronomique de combinaisons possibles.
              </FaqItem>
              <FaqItem q="Comment le temps de crack est-il estimé ?">
                On suppose un attaquant disposant de matériel capable de 10¹² (1 trillion) essais par seconde — un
                ordre de grandeur réaliste pour du cracking GPU avec hashcat. Le temps affiché est le temps moyen
                (50 % des combinaisons testées).
              </FaqItem>
              <FaqItem q="Mes données sont-elles envoyées quelque part ?">
                Non. La génération est 100 % côté client via l'API Web Crypto du navigateur. La wordlist est
                chargée une seule fois, puis tout se passe en local. L'API serveur (<code className="font-mono text-xs bg-subtle dark:bg-subtle-dark px-1 rounded">/dicepass/api</code>) est
                disponible séparément pour les intégrations, mais l'interface web ne l'utilise pas.
              </FaqItem>
